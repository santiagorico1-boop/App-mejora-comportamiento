<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Estrellitas - Fase 1</title>
    <style>
        /* Variables para modo oscuro/claro automático */
        :root {
            --bg-gradient: linear-gradient(135deg, #0a0f1e, #0f172a);
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-color: #f1f5f9;
            --border-color: rgba(255,255,255,0.1);
            --btn-bg: #334155;
            --btn-hover: #4f46e5;
            --input-bg: #0f172a;
            --dashboard-bg: #0f172a;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-gradient: linear-gradient(135deg, #e0e7ff, #cbd5e1);
                --card-bg: rgba(255, 255, 255, 0.95);
                --text-color: #1e293b;
                --border-color: rgba(0,0,0,0.1);
                --btn-bg: #e2e8f0;
                --btn-hover: #4f46e5;
                --input-bg: #f1f5f9;
                --dashboard-bg: #f8fafc;
                --shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            }
            .dashboard-card, .historial-item, .tarea, .nino-item, .card {
                color: #1e293b;
            }
            input, select, textarea {
                color: #1e293b;
                background: #f1f5f9;
            }
        }
        body {
            background: var(--bg-gradient);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        button, .tab {
            background: var(--btn-bg);
            border: none;
            color: var(--text-color);
            font-weight: 600;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover, .tab:hover {
            background: var(--btn-hover);
            transform: scale(0.97);
        }
        .tab-active {
            background: #4f46e5;
            box-shadow: 0 4px 10px rgba(79,70,229,0.4);
        }
        .nino-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .puntos {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #facc15, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .dashboard-card {
            background: var(--dashboard-bg);
            border-radius: 1.5rem;
            padding: 0.8rem;
            text-align: center;
        }
        .tarea, .nino-item, .premio-item {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            margin: 0.6rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .flex-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
            justify-content: center;
        }
        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            color: var(--text-color);
        }
        .historial-item {
            background: var(--dashboard-bg);
            border-radius: 1rem;
            padding: 0.7rem;
            margin: 0.5rem 0;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            text-align: left;
        }
        @media (max-width: 550px) {
            .dashboard-grid { grid-template-columns: repeat(2,1fr); }
            .puntos { font-size: 2.5rem; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container" id="root"></div>

<script>
    // ---------- FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBmK46i3J4iaVAM1zAp9sWyXWqrgCDovOc",
        authDomain: "app-estrellitas.firebaseapp.com",
        projectId: "app-estrellitas",
        storageBucket: "app-estrellitas.appspot.com",
        messagingSenderId: "1008307661681",
        appId: "1:1008307661681:web:f1a8134f67910e2279e4d0"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ---------- ESTADO GLOBAL ----------
    let currentUser = null;
    let currentUserData = null;
    let isAdmin = false;
    let esModoJuego = false;
    let pantalla = 'tareas';
    let ninos = [];
    let ninoSeleccionado = null;
    let tareas = [];
    let premios = [];

    // Sonidos (Web Audio)
    function playSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            let freq = 440;
            if (type === 'puntos') freq = 880;
            else if (type === 'canje') freq = 330;
            else if (type === 'logro') freq = 660;
            osc.frequency.value = freq;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
            setTimeout(() => audioCtx.close(), 600);
        } catch(e) { /* silencio */ }
    }

    function mostrar(texto, ok = true) {
        let msg = document.getElementById('msg');
        if (msg) {
            msg.textContent = texto;
            msg.style.color = ok ? '#10b981' : '#ef4444';
            setTimeout(() => msg.textContent = '', 2500);
        }
    }

    // Fecha Colombia
    function getFechaColombia() {
        const now = new Date();
        const colombiaOffset = -5 * 60;
        const localOffset = now.getTimezoneOffset();
        const diff = colombiaOffset - localOffset;
        const colombiaDate = new Date(now.getTime() + diff * 60 * 1000);
        return colombiaDate.toISOString().split('T')[0];
    }

    // Reconocimiento por usuario (limitado a 1 vez al día por tipo)
    function getUsuarioId() { return esModoJuego ? 'modoJuego' : (currentUser ? currentUser.uid : 'anonimo'); }
    async function reconocimientoUsadoHoyGlobal(cantidad) {
        const hoy = getFechaColombia();
        const usuario = getUsuarioId();
        if (usuario === 'modoJuego') return localStorage.getItem(`reco_${cantidad}`) === hoy;
        if (usuario !== 'anonimo') {
            const doc = await db.collection('reconocimientosDiarios').doc(`${usuario}_${cantidad}`).get();
            return doc.exists && doc.data().fecha === hoy;
        }
        return false;
    }
    async function marcarReconocimientoUsadoGlobal(cantidad) {
        const hoy = getFechaColombia();
        const usuario = getUsuarioId();
        if (usuario === 'modoJuego') localStorage.setItem(`reco_${cantidad}`, hoy);
        else if (usuario !== 'anonimo') await db.collection('reconocimientosDiarios').doc(`${usuario}_${cantidad}`).set({ fecha: hoy, cantidad });
    }

    // Orden y config
    function ordenarTareas() { tareas.sort((a,b) => b.puntos - a.puntos); }
    function ordenarPremios() { premios.sort((a,b) => b.costo - a.costo); }
    async function cargarConfiguracion() {
        const configDoc = await db.collection('configuracion').doc('estrellitas').get();
        if (configDoc.exists) {
            const data = configDoc.data();
            tareas = data.tareas || [];
            premios = data.premios || [];
        }
        if (tareas.length === 0) {
            tareas = [
                { id: 1, nombre: "📚 Leer 15 min", puntos: 10 },
                { id: 2, nombre: "🏠 Ordenar cuarto", puntos: 8 },
                { id: 3, nombre: "🍽️ Poner la mesa", puntos: 5 },
                { id: 4, nombre: "✏️ Hacer tareas", puntos: 12 }
            ];
            await guardarConfiguracion();
        }
        if (premios.length === 0) {
            premios = [
                { id: 1, nombre: "🚲 Montar bici", costo: 30 },
                { id: 2, nombre: "🌳 Ir al parque", costo: 25 },
                { id: 3, nombre: "🍦 Helado", costo: 35 },
                { id: 4, nombre: "📱 30 min pantalla", costo: 20 }
            ];
            await guardarConfiguracion();
        }
        ordenarTareas(); ordenarPremios();
    }
    async function guardarConfiguracion() {
        ordenarTareas(); ordenarPremios();
        await db.collection('configuracion').doc('estrellitas').set({ tareas, premios });
    }

    // Guardar niño (solo si NO es modo juego)
    async function guardarDatosNino() {
        if (!ninoSeleccionado || esModoJuego) return;
        await db.collection('ninios').doc(ninoSeleccionado.id).set(ninoSeleccionado);
        const idx = ninos.findIndex(n => n.id === ninoSeleccionado.id);
        if (idx !== -1) ninos[idx] = ninoSeleccionado;
        await db.collection('global').doc('datos').set({ ninos });
    }

    // Recalcular estadísticas incluyendo racha
    function recalcularStats(nino) {
        let ganado = 0, perdido = 0, canjeado = 0, reconocimiento = 0, actual = 0;
        let diasConPuntos = new Set();
        if (nino.historial) {
            for (const h of nino.historial) {
                if (h.puntos > 0) {
                    ganado += h.puntos;
                    actual += h.puntos;
                    if (h.esReconocimiento) reconocimiento += h.puntos;
                    let fecha = h.timestamp ? new Date(h.timestamp).toISOString().split('T')[0] : null;
                    if (fecha) diasConPuntos.add(fecha);
                } else {
                    if (h.esCanje) canjeado += Math.abs(h.puntos);
                    else perdido += Math.abs(h.puntos);
                    actual += h.puntos;
                }
            }
        }
        // Calcular racha actual (días consecutivos hasta hoy)
        const hoy = getFechaColombia();
        let fechaCursor = new Date(hoy);
        let racha = 0;
        for (let i = 0; i < 30; i++) {
            let fechaStr = fechaCursor.toISOString().split('T')[0];
            if (diasConPuntos.has(fechaStr)) racha++;
            else break;
            fechaCursor.setDate(fechaCursor.getDate() - 1);
        }
        nino.totalGanado = ganado;
        nino.totalPerdido = perdido;
        nino.totalCanjeado = canjeado;
        nino.totalReconocimiento = reconocimiento;
        nino.puntos = Math.max(0, actual);
        nino.rachaActual = racha;
        nino.mejorRacha = Math.max(nino.mejorRacha || 0, racha);
        return nino;
    }

    async function agregarHistorial(texto, cambio, esCanje = false, esReconocimiento = false) {
        if (!ninoSeleccionado) { mostrar("Selecciona un niño", false); return; }
        const entrada = {
            id: Date.now(),
            texto, puntos: cambio, esCanje, esReconocimiento,
            quien: currentUserData?.nombre || (esModoJuego ? '🎮 Juego' : 'Admin'),
            fecha: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        ninoSeleccionado.historial = [entrada, ...(ninoSeleccionado.historial || []).slice(0, 199)];
        recalcularStats(ninoSeleccionado);
        await guardarDatosNino();
        // Sonido según el tipo
        if (cambio > 0) playSound('puntos');
        else if (esCanje) playSound('canje');
        else playSound('puntos');
        render();
    }

    // Acciones principales
    async function darPuntos(idTarea) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        const tarea = tareas.find(t => t.id === idTarea);
        if (!tarea) return;
        await agregarHistorial(`✅ ${tarea.nombre} +${tarea.puntos}⭐`, tarea.puntos);
        mostrar(`+${tarea.puntos}⭐ para ${ninoSeleccionado.nombre}`);
    }
    async function quitarPuntos(cantidad, motivo) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        if ((ninoSeleccionado.puntos || 0) < cantidad) return mostrar(`Solo tiene ${ninoSeleccionado.puntos}⭐`, false);
        await agregarHistorial(`🔻 ${motivo} -${cantidad}⭐`, -cantidad);
        mostrar(`-${cantidad}⭐ para ${ninoSeleccionado.nombre}`);
    }
    async function darReconocimiento(cantidad) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        if (await reconocimientoUsadoHoyGlobal(cantidad)) return mostrar(`Ya usaste +${cantidad}⭐ hoy`, false);
        await agregarHistorial(`👍🏻 Reconocimiento: +${cantidad}⭐`, cantidad, false, true);
        await marcarReconocimientoUsadoGlobal(cantidad);
        mostrar(`👍🏻 +${cantidad}⭐ para ${ninoSeleccionado.nombre}`);
    }
    async function canjearPremio(idPremio) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        const premio = premios.find(p => p.id === idPremio);
        if (!premio) return;
        if ((ninoSeleccionado.puntos || 0) >= premio.costo) {
            await agregarHistorial(`🎁 CANJE: ${premio.nombre} -${premio.costo}⭐`, -premio.costo, true);
            mostrar(`¡${ninoSeleccionado.nombre} canjeó ${premio.nombre}!`);
        } else mostrar(`Faltan ${premio.costo - ninoSeleccionado.puntos}⭐`, false);
    }
    async function eliminarEntrada(id) {
        if (!ninoSeleccionado) return;
        ninoSeleccionado.historial = ninoSeleccionado.historial.filter(h => h.id !== id);
        recalcularStats(ninoSeleccionado);
        await guardarDatosNino();
        render();
    }

    // CRUD Niños
    async function agregarNino(nombre, avatar) {
        if (!nombre) return mostrar("Nombre requerido", false);
        const nuevo = {
            id: Date.now().toString(),
            nombre: nombre.trim(),
            avatar: avatar || "👶",
            puntos: 0, totalGanado: 0, totalPerdido: 0, totalCanjeado: 0, totalReconocimiento: 0,
            historial: [], metaPremioId: null, mejorRacha: 0
        };
        ninos.push(nuevo);
        await db.collection('ninios').doc(nuevo.id).set(nuevo);
        await db.collection('global').doc('datos').set({ ninos });
        if (!ninoSeleccionado) ninoSeleccionado = nuevo;
        render();
    }
    async function eliminarNino(id) {
        if (confirm("Eliminar niño? perderá sus puntos")) {
            ninos = ninos.filter(n => n.id !== id);
            await db.collection('ninios').doc(id).delete();
            await db.collection('global').doc('datos').set({ ninos });
            if (ninoSeleccionado?.id === id) ninoSeleccionado = ninos[0] || null;
            render();
        }
    }
    async function editarNino(id, nombre, avatar) {
        let n = ninos.find(n => n.id === id);
        if (n) { n.nombre = nombre; n.avatar = avatar; await guardarDatosNino(); if (ninoSeleccionado?.id === id) ninoSeleccionado = n; render(); }
    }
    // CRUD Tareas/Premios
    async function agregarTarea(nombre, puntos) { if (!nombre || puntos <= 0) return; tareas.push({ id: Date.now(), nombre, puntos: parseInt(puntos) }); ordenarTareas(); await guardarConfiguracion(); render(); }
    async function editarTarea(id, nombre, puntos) { let t = tareas.find(t => t.id === id); if (t) { t.nombre = nombre; t.puntos = puntos; ordenarTareas(); await guardarConfiguracion(); render(); } }
    async function eliminarTarea(id) { tareas = tareas.filter(t => t.id !== id); ordenarTareas(); await guardarConfiguracion(); render(); }
    async function agregarPremio(nombre, costo) { if (!nombre || costo <= 0) return; premios.push({ id: Date.now(), nombre, costo: parseInt(costo) }); ordenarPremios(); await guardarConfiguracion(); render(); }
    async function editarPremio(id, nombre, costo) { let p = premios.find(p => p.id === id); if (p) { p.nombre = nombre; p.costo = costo; ordenarPremios(); await guardarConfiguracion(); render(); } }
    async function eliminarPremio(id) { premios = premios.filter(p => p.id !== id); ordenarPremios(); await guardarConfiguracion(); render(); }
    async function editarUsuario(uid, datos) { await db.collection('users').doc(uid).update(datos); if (currentUser && currentUser.uid === uid) { currentUserData = { ...currentUserData, ...datos }; isAdmin = datos.isAdmin !== undefined ? datos.isAdmin : isAdmin; } render(); }

    // Exportar CSV
    function exportarCSV() {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        let csv = "Fecha,Acción,Puntos,Usuario\n";
        ninoSeleccionado.historial.forEach(h => {
            csv += `"${h.fecha}","${h.texto.replace(/"/g, '""')}",${h.puntos},"${h.quien}"\n`;
        });
        const blob = new Blob([csv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `historial_${ninoSeleccionado.nombre}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    function copiarCSV() {
        if (!ninoSeleccionado) return;
        let csv = "Fecha,Acción,Puntos,Usuario\n";
        ninoSeleccionado.historial.forEach(h => {
            csv += `"${h.fecha}","${h.texto.replace(/"/g, '""')}",${h.puntos},"${h.quien}"\n`;
        });
        navigator.clipboard.writeText(csv);
        mostrar("CSV copiado al portapapeles");
    }

    // Pantalla login
    function renderLogin() {
        document.getElementById('root').innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
                <div class="card" style="max-width:400px;">
                    <div style="font-size:64px;">⭐</div>
                    <h2 style="color:#fde68a;">Estrellitas</h2>
                    <div id="msg"></div>
                    <button id="btn-jugar" style="background:#f59e0b; font-size:1.4rem;">🎮 Jugar ahora</button>
                    <div style="border-top:1px solid #ccc; margin:20px 0;"></div>
                    <h3>🔐 Iniciar sesión</h3>
                    <input type="email" id="login-email" placeholder="Correo">
                    <input type="password" id="login-pass" placeholder="Contraseña">
                    <button id="btn-login">➡️ Entrar</button>
                    <button id="btn-reset-pass" style="background:transparent; border:1px solid; margin-top:8px;">¿Olvidaste tu contraseña?</button>
                    <details style="margin-top:20px;">
                        <summary>📝 Crear cuenta nueva</summary>
                        <input type="text" id="reg-nombre" placeholder="Tu nombre">
                        <input type="text" id="reg-emoji" placeholder="Emoji" value="👩">
                        <input type="text" id="reg-rol" placeholder="Rol">
                        <input type="email" id="reg-email" placeholder="Correo">
                        <input type="password" id="reg-pass" placeholder="Contraseña (6+)">
                        <button id="btn-registro">Crear cuenta</button>
                    </details>
                </div>
            </div>
        `;
        document.getElementById('btn-jugar').onclick = async () => {
            esModoJuego = true; isAdmin = false; currentUser = { uid: 'modoJuego' };
            await cargarConfiguracion();
            const globalData = await db.collection('global').doc('datos').get();
            ninos = globalData.exists ? globalData.data().ninos || [] : [];
            for (let i = 0; i < ninos.length; i++) {
                const nd = await db.collection('ninios').doc(ninos[i].id).get();
                if (nd.exists) ninos[i] = nd.data();
                if (!ninos[i].mejorRacha) ninos[i].mejorRacha = 0;
            }
            if (ninos.length && !ninoSeleccionado) ninoSeleccionado = ninos[0];
            render();
        };
        document.getElementById('btn-login').onclick = async () => {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value);
                location.reload();
            } catch(e) { mostrar(e.message, false); }
        };
        document.getElementById('btn-reset-pass').onclick = async () => {
            const email = document.getElementById('login-email').value;
            if (!email) return mostrar("Ingresa tu correo", false);
            try { await auth.sendPasswordResetEmail(email); mostrar("Correo enviado", true); } catch(e) { mostrar(e.message, false); }
        };
        document.getElementById('btn-registro').onclick = async () => {
            const nombre = document.getElementById('reg-nombre').value, email = document.getElementById('reg-email').value, pass = document.getElementById('reg-pass').value;
            if (!nombre || !email || !pass) return mostrar("Completa", false);
            if (pass.length < 6) return mostrar("Mínimo 6", false);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, pass);
                const users = await db.collection('users').get();
                const esPrimero = users.empty;
                await db.collection('users').doc(result.user.uid).set({
                    email, nombre, emoji: document.getElementById('reg-emoji').value || '👤', rol: document.getElementById('reg-rol').value || 'Familiar', isAdmin: esPrimero
                });
                mostrar(esPrimero ? "✅ Eres ADMIN, inicia sesión" : "Cuenta creada", true);
                setTimeout(() => location.reload(), 1500);
            } catch(e) { mostrar(e.message, false); }
        };
    }

    // Render principal
    async function render() {
        if (!currentUser && !esModoJuego) { renderLogin(); return; }
        let html = `<div id="msg"></div>`;
        if (ninoSeleccionado) {
            const stats = ninoSeleccionado;
            html += `<div class="nino-buttons">${ninos.map(n => `<button class="tab ${ninoSeleccionado?.id === n.id ? 'tab-active' : ''}" onclick="seleccionarNino('${n.id}')">${n.avatar || '👶'} ${n.nombre} (${n.puntos || 0}⭐)</button>`).join('')}</div>`;
            html += `<div class="card"><div class="puntos">${stats.puntos || 0}</div><div>⭐</div></div>`;
            html += `<div class="dashboard-grid">
                        <div class="dashboard-card"><div>🏆</div><div style="color:#10b981;">${stats.totalGanado || 0}</div><div>Ganadas</div></div>
                        <div class="dashboard-card"><div>🔻</div><div style="color:#f97316;">${stats.totalPerdido || 0}</div><div>Perdidas</div></div>
                        <div class="dashboard-card"><div>🎁</div><div style="color:#facc15;">${stats.totalCanjeado || 0}</div><div>Canjeados</div></div>
                        <div class="dashboard-card"><div>👍🏻</div><div style="color:#10b981;">${stats.totalReconocimiento || 0}</div><div>Reconocimientos</div></div>
                        <div class="dashboard-card"><div>🔥</div><div style="color:#f97316;">${stats.rachaActual || 0}</div><div>Racha actual</div></div>
                        <div class="dashboard-card"><div>🏅</div><div>${stats.mejorRacha || 0}</div><div>Mejor racha</div></div>
                     </div>`;
        } else html += `<div class="card">No hay niños. ${isAdmin ? 'Agrega uno en Niños.' : 'Contacta admin.'}</div>`;

        html += `<div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:16px 0;">
                    <button class="tab ${pantalla === 'tareas' ? 'tab-active' : ''}" onclick="pantalla='tareas';render()">⭐ Tareas</button>
                    <button class="tab ${pantalla === 'premios' ? 'tab-active' : ''}" onclick="pantalla='premios';render()">🎁 Premios</button>
                    <button class="tab ${pantalla === 'historial' ? 'tab-active' : ''}" onclick="pantalla='historial';render()">📜 Historial</button>
                    ${isAdmin ? `<button class="tab ${pantalla === 'admin' ? 'tab-active' : ''}" onclick="pantalla='admin';render()">🔧 Admin</button>` : ''}
                    <button class="tab" id="logout-btn">🚪 Salir</button>
                </div>`;

        if (pantalla === 'tareas' && ninoSeleccionado) {
            html += `<div class="card"><h3>📋 Tareas</h3>${tareas.map(t => `<div class="tarea"><span>${t.nombre}</span><button onclick="darPuntos(${t.id})">+${t.puntos}⭐</button></div>`).join('')}
                     <h3>🔻 Quitar puntos</h3>
                     <div class="tarea quitar-puntos"><span>😠 Mal comportamiento</span><button onclick="quitarPuntos(1,'Mal comportamiento')">-1⭐</button></div>
                     <div class="tarea quitar-puntos"><span>😤 Berrinche</span><button onclick="quitarPuntos(2,'Berrinche')">-2⭐</button></div>
                     <div class="tarea quitar-puntos"><span>💢 Acción grave</span><button onclick="quitarPuntos(5,'Acción grave')">-5⭐</button></div>
                     <div class="flex-row"><input id="cantidad-custom" type="number" placeholder="Cantidad" value="1"><input id="motivo-custom" placeholder="Motivo" value="Otro"><button id="quitar-custom">Quitar</button></div>
                     <h3>👍🏻 Reconocimiento extra (1 vez/día)</h3>`;
            const u1 = await reconocimientoUsadoHoyGlobal(1), u2 = await reconocimientoUsadoHoyGlobal(2), u3 = await reconocimientoUsadoHoyGlobal(3);
            html += `<div class="tarea reconocimiento"><span>👍🏻 Bueno</span><button onclick="darReconocimiento(1)" ${u1 ? 'disabled' : ''}>+1⭐</button></div>
                     <div class="tarea reconocimiento"><span>👍🏻👍🏻 Muy bien</span><button onclick="darReconocimiento(2)" ${u2 ? 'disabled' : ''}>+2⭐</button></div>
                     <div class="tarea reconocimiento"><span>👍🏻👍🏻👍🏻 Excelente</span><button onclick="darReconocimiento(3)" ${u3 ? 'disabled' : ''}>+3⭐</button></div>
                     </div>`;
        } else if (pantalla === 'tareas' && !ninoSeleccionado) html += `<div class="card"><p>Selecciona un niño</p></div>`;

        if (pantalla === 'premios' && ninoSeleccionado) {
            html += `<div class="card"><h3>🎁 Premios (${ninoSeleccionado.puntos || 0}⭐)</h3>${premios.map(p => `<div class="tarea"><span>${p.nombre} — ${p.costo}⭐</span><button onclick="canjearPremio(${p.id})" ${(ninoSeleccionado.puntos || 0) < p.costo ? 'disabled' : ''}>Canjear</button></div>`).join('')}</div>`;
        } else if (pantalla === 'premios' && !ninoSeleccionado) html += `<div class="card"><p>Selecciona un niño</p></div>`;

        if (pantalla === 'historial' && ninoSeleccionado) {
            html += `<div class="card"><h3>📜 Historial de ${ninoSeleccionado.nombre}</h3><div style="display:flex; gap:8px; justify-content:center; margin-bottom:10px;"><button onclick="exportarCSV()">📎 Exportar CSV</button><button onclick="copiarCSV()">📋 Copiar CSV</button></div>`;
            if ((ninoSeleccionado.historial || []).length === 0) html += `<p>Sin actividad</p>`;
            else ninoSeleccionado.historial.forEach(h => { html += `<div class="historial-item"><div><strong>${h.puntos > 0 ? '✅' : (h.esCanje ? '🎁' : '🔻')} ${h.texto}</strong><br><small>${h.fecha} — por ${h.quien}</small></div>${isAdmin ? `<button onclick="eliminarEntrada(${h.id})">✕</button>` : ''}</div>`; });
            html += `</div>`;
        }

        if (pantalla === 'admin' && isAdmin) {
            html += `<div class="card"><h3>🔧 Admin</h3>
                     <h4>⭐ Tareas</h4><div id="lista-tareas-admin"></div>
                     <div class="flex-row"><input id="nueva-tarea-nombre" placeholder="Nombre"><input id="nueva-tarea-puntos" type="number" placeholder="Puntos"><button id="agregar-tarea">+</button></div>
                     <h4>🎁 Premios</h4><div id="lista-premios-admin"></div>
                     <div class="flex-row"><input id="nuevo-premio-nombre" placeholder="Nombre"><input id="nuevo-premio-costo" type="number" placeholder="Costo"><button id="agregar-premio">+</button></div>
                     <h4>👥 Usuarios</h4><div id="lista-usuarios"></div>
                     </div>`;
        }

        document.getElementById('root').innerHTML = html;

        document.getElementById('logout-btn').onclick = () => { if (esModoJuego) { esModoJuego = false; currentUser = null; renderLogin(); } else auth.signOut().then(() => location.reload()); };
        const quitarCustom = document.getElementById('quitar-custom'); if (quitarCustom) quitarCustom.onclick = () => quitarPuntos(parseInt(document.getElementById('cantidad-custom').value) || 1, document.getElementById('motivo-custom').value || 'Otro');
        const agregarNinoBtn = document.getElementById('agregar-nino'); if (agregarNinoBtn) agregarNinoBtn.onclick = () => agregarNino(document.getElementById('nuevo-nino').value, document.getElementById('nuevo-avatar').value);

        if (pantalla === 'admin' && isAdmin) {
            const tareasDiv = document.getElementById('lista-tareas-admin');
            if (tareasDiv) {
                tareasDiv.innerHTML = '';
                tareas.forEach(t => { tareasDiv.innerHTML += `<div class="tarea"><input value="${t.nombre.replace(/"/g, '&quot;')}" id="edit-tarea-nombre-${t.id}"><input value="${t.puntos}" id="edit-tarea-puntos-${t.id}" type="number" style="width:70px"><button onclick="editarTarea(${t.id},document.getElementById('edit-tarea-nombre-${t.id}').value,parseInt(document.getElementById('edit-tarea-puntos-${t.id}').value))">💾</button><button onclick="eliminarTarea(${t.id})">✕</button></div>`; });
            }
            const premiosDiv = document.getElementById('lista-premios-admin');
            if (premiosDiv) {
                premiosDiv.innerHTML = '';
                premios.forEach(p => { premiosDiv.innerHTML += `<div class="tarea"><input value="${p.nombre.replace(/"/g, '&quot;')}" id="edit-premio-nombre-${p.id}"><input value="${p.costo}" id="edit-premio-costo-${p.id}" type="number" style="width:70px"><button onclick="editarPremio(${p.id},document.getElementById('edit-premio-nombre-${p.id}').value,parseInt(document.getElementById('edit-premio-costo-${p.id}').value))">💾</button><button onclick="eliminarPremio(${p.id})">✕</button></div>`; });
            }
            document.getElementById('agregar-tarea')?.addEventListener('click', () => agregarTarea(document.getElementById('nueva-tarea-nombre').value, document.getElementById('nueva-tarea-puntos').value));
            document.getElementById('agregar-premio')?.addEventListener('click', () => agregarPremio(document.getElementById('nuevo-premio-nombre').value, document.getElementById('nuevo-premio-costo').value));
            const usuariosDiv = document.getElementById('lista-usuarios');
            if (usuariosDiv) {
                const usersSnap = await db.collection('users').get();
                usuariosDiv.innerHTML = '';
                for (const doc of usersSnap.docs) {
                    const u = doc.data();
                    usuariosDiv.innerHTML += `<div class="nino-item"><div>${u.emoji || '👤'} <strong>${u.nombre}</strong> (${u.rol || 'Familiar'}) ${u.isAdmin ? '👑' : ''}</div><div class="flex-row"><input id="edit-user-nombre-${doc.id}" value="${u.nombre.replace(/"/g, '&quot;')}"><input id="edit-user-emoji-${doc.id}" value="${u.emoji || '👤'}" style="width:70px"><input id="edit-user-rol-${doc.id}" value="${u.rol || 'Familiar'}"><button onclick="editarUsuario('${doc.id}',{nombre:document.getElementById('edit-user-nombre-${doc.id}').value, emoji:document.getElementById('edit-user-emoji-${doc.id}').value, rol:document.getElementById('edit-user-rol-${doc.id}').value})">💾</button>${!u.isAdmin ? `<button onclick="editarUsuario('${doc.id}',{isAdmin:true})">👑 Admin</button>` : ''}</div></div>`;
                }
            }
        }
    }

    window.seleccionarNino = (id) => { ninoSeleccionado = ninos.find(n => n.id === id); render(); };
    window.darPuntos = darPuntos; window.quitarPuntos = quitarPuntos; window.darReconocimiento = darReconocimiento;
    window.canjearPremio = canjearPremio; window.eliminarEntrada = eliminarEntrada; window.eliminarNino = eliminarNino;
    window.editarNino = editarNino; window.agregarTarea = agregarTarea; window.editarTarea = editarTarea;
    window.eliminarTarea = eliminarTarea; window.agregarPremio = agregarPremio; window.editarPremio = editarPremio;
    window.eliminarPremio = eliminarPremio; window.editarUsuario = editarUsuario;
    window.exportarCSV = exportarCSV; window.copiarCSV = copiarCSV;

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user; esModoJuego = false;
            const doc = await db.collection('users').doc(user.uid).get();
            isAdmin = doc.exists ? doc.data().isAdmin : false;
            currentUserData = doc.exists ? doc.data() : null;
            await cargarConfiguracion();
            const globalData = await db.collection('global').doc('datos').get();
            ninos = globalData.exists ? globalData.data().ninos || [] : [];
            for (let i = 0; i < ninos.length; i++) {
                const nd = await db.collection('ninios').doc(ninos[i].id).get();
                if (nd.exists) ninos[i] = nd.data();
                if (!ninos[i].mejorRacha) ninos[i].mejorRacha = 0;
                recalcularStats(ninos[i]);
            }
            if (ninos.length && !ninoSeleccionado) ninoSeleccionado = ninos[0];
            render();
        } else if (!esModoJuego) renderLogin();
        else { await cargarConfiguracion(); render(); }
    });
</script>
</body>
</html>
