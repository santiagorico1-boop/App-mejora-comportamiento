<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Estrellitas</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a0f1e, #0f172a);
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-color: #f1f5f9;
            --border-color: rgba(255,255,255,0.1);
            --btn-bg: #334155;
            --btn-hover: #4f46e5;
            --input-bg: #0f172a;
            --dashboard-bg: #0f172a;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
            --estrella-glow: 0 0 20px rgba(250,204,21,0.5);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-gradient: linear-gradient(135deg, #e0e7ff, #cbd5e1);
                --card-bg: rgba(255, 255, 255, 0.95);
                --text-color: #1e293b;
                --border-color: rgba(0,0,0,0.1);
                --btn-bg: #e2e8f0;
                --btn-hover: #4f46e5;
                --input-bg: #f1f5f9;
                --dashboard-bg: #f8fafc;
                --shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
                --estrella-glow: 0 0 15px rgba(250,204,21,0.3);
            }
            .dashboard-card, .historial-item, .tarea, .nino-item, .card {
                color: #1e293b;
            }
            input, select, textarea { color: #1e293b; background: #f1f5f9; }
        }
        body {
            background: var(--bg-gradient);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { max-width: 700px; width: 100%; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        button, .tab {
            background: var(--btn-bg);
            border: none;
            color: var(--text-color);
            font-weight: 600;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover, .tab:hover { background: var(--btn-hover); transform: scale(0.97); }
        .tab-active { background: #4f46e5; box-shadow: 0 4px 10px rgba(79,70,229,0.4); }
        .nino-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .estrella-principal {
            background: linear-gradient(145deg, var(--card-bg), var(--input-bg));
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--estrella-glow);
            border: 1px solid rgba(250,204,21,0.3);
        }
        .puntos-area { text-align: center; flex: 1; }
        .puntos {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #facc15, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
            text-shadow: 0 0 10px rgba(250,204,21,0.3);
        }
        .mensaje-motivador {
            font-size: 0.8rem;
            color: #facc15;
            margin-top: 0.2rem;
            font-style: italic;
        }
        .mascota {
            font-size: 3.5rem;
            cursor: pointer;
            filter: drop-shadow(0 0 8px #facc15);
            transition: transform 0.2s;
            animation: flotar 2s infinite ease;
        }
        .mascota:hover { transform: scale(1.1); }
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .dashboard-card {
            background: var(--dashboard-bg);
            border-radius: 1.5rem;
            padding: 0.8rem;
            text-align: center;
        }
        .tarea, .nino-item, .premio-item {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            margin: 0.6rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .flex-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
            justify-content: center;
        }
        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            color: var(--text-color);
        }
        .historial-item {
            background: var(--dashboard-bg);
            border-radius: 1rem;
            padding: 0.7rem;
            margin: 0.5rem 0;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            text-align: left;
        }
        .calendario {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 1rem;
        }
        .dia-calendario {
            background: var(--input-bg);
            border-radius: 0.8rem;
            text-align: center;
            padding: 0.4rem;
            font-size: 0.7rem;
        }
        .ruleta-btn {
            background: #f59e0b;
            font-size: 1.2rem;
            padding: 0.8rem 2rem;
        }
        .barra-progreso {
            background: var(--input-bg);
            border-radius: 1rem;
            height: 1.2rem;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .barra-fill { background: #facc15; height: 100%; width: 0%; transition: width 0.3s; }
        .ruleta-mensaje {
            margin-top: 1rem;
            padding: 0.8rem;
            background: var(--dashboard-bg);
            border-radius: 1rem;
            font-weight: bold;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .golden-animation {
            animation: goldenFlash 0.5s ease 3;
        }
        @keyframes goldenFlash {
            0% { background-color: #FFD700; box-shadow: 0 0 0 0 #FFD700; }
            50% { background-color: #FFF; box-shadow: 0 0 20px 10px #FFD700; }
            100% { background-color: var(--dashboard-bg); box-shadow: none; }
        }
        @media (max-width: 550px) {
            .dashboard-grid { grid-template-columns: repeat(2,1fr); }
            .puntos { font-size: 2.5rem; }
            .mascota { font-size: 2.5rem; }
        }
    </style>

<script>
    // ---------- FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyBmK46i3J4iaVAM1zAp9sWyXWqrgCDovOc",
        authDomain: "app-estrellitas.firebaseapp.com",

    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ---------- ESTADO ----------
    let currentUser = null, currentUserData = null, isAdmin = false, esModoJuego = false;
    let pantalla = 'tareas', ninos = [], ninoSeleccionado = null, tareas = [], premios = [], chartInstance = null;
    let ultimoMensajeRuleta = "✨ Haz girar la ruleta ✨";

    // Sonidos
    function playSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            let freq = 440;
            if (type === 'puntos') freq = 880;
            else if (type === 'canje') freq = 330;
            else if (type === 'logro') freq = 660;
            osc.frequency.value = freq;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
            setTimeout(() => audioCtx.close(), 600);
        } catch(e) { /* silencio */ }
    }

    function mostrar(texto, ok = true) {
        let msg = document.getElementById('msg');
        if (msg) {
            msg.textContent = texto;
            msg.style.color = ok ? '#10b981' : '#ef4444';
            setTimeout(() => msg.textContent = '', 2500);
        }
    }

    // Fecha Colombia
    function getFechaColombia() {
        const ahora = new Date();
        const colombiaOffset = -5 * 60;
        const localOffset = ahora.getTimezoneOffset();
        const diff = colombiaOffset - localOffset;
        return new Date(ahora.getTime() + diff * 60 * 1000);
    }
    function getFechaStrColombia(fecha = null) {
        const date = fecha ? new Date(fecha) : getFechaColombia();
        const colombiaOffset = -5 * 60;
        const localOffset = date.getTimezoneOffset();
        const diff = colombiaOffset - localOffset;
        const colombiaDate = new Date(date.getTime() + diff * 60 * 1000);
        return colombiaDate.toISOString().split('T')[0];
    }

    // Reconocimiento por usuario (1 vez al día por tipo)
    function getUsuarioId() { return esModoJuego ? 'modoJuego' : (currentUser ? currentUser.uid : 'anonimo'); }
    async function reconocimientoUsadoHoyGlobal(cantidad) {
        const hoy = getFechaStrColombia();
        const usuario = getUsuarioId();
        if (usuario === 'modoJuego') return localStorage.getItem(`reco_${cantidad}`) === hoy;
        if (usuario !== 'anonimo') {
            const doc = await db.collection('reconocimientosDiarios').doc(`${usuario}_${cantidad}`).get();
            return doc.exists && doc.data().fecha === hoy;
        }
        return false;
    }
    async function marcarReconocimientoUsadoGlobal(cantidad) {
        const hoy = getFechaStrColombia();
        const usuario = getUsuarioId();
        if (usuario === 'modoJuego') localStorage.setItem(`reco_${cantidad}`, hoy);
        else if (usuario !== 'anonimo') await db.collection('reconocimientosDiarios').doc(`${usuario}_${cantidad}`).set({ fecha: hoy, cantidad });
    }

    // Tareas recurrentes (rutinas)
    const tareasRecurrentesDef = [
        { id: "cepillado", nombre: "🦷 Cepillarse los dientes", puntosPorVez: 2, maxPorDia: 3 }
    ];

    // Orden y config
    function ordenarTareas() { tareas.sort((a,b) => b.puntos - a.puntos); }
    function ordenarPremios() { premios.sort((a,b) => b.costo - a.costo); }
    async function cargarConfiguracion() {
        const configDoc = await db.collection('configuracion').doc('estrellitas').get();
        if (configDoc.exists) { const d = configDoc.data(); tareas = d.tareas || []; premios = d.premios || []; }
        if (tareas.length === 0) {
            tareas = [
                { id: 1, nombre: "📚 Leer 15 min", puntos: 10 },
                { id: 2, nombre: "🏠 Ordenar cuarto", puntos: 8 },
                { id: 3, nombre: "🍽️ Poner la mesa", puntos: 5 },
                { id: 4, nombre: "✏️ Hacer tareas", puntos: 12 }
            ];
            await guardarConfiguracion();
        }
        if (premios.length === 0) {
            premios = [
                { id: 1, nombre: "🚲 Montar bici", costo: 30 },
                { id: 2, nombre: "🌳 Ir al parque", costo: 25 },
                { id: 3, nombre: "🍦 Helado", costo: 35 },
                { id: 4, nombre: "📱 30 min pantalla", costo: 20 }
            ];
            await guardarConfiguracion();
        }
        ordenarTareas(); ordenarPremios();
    }
    async function guardarConfiguracion() {
        ordenarTareas(); ordenarPremios();
        await db.collection('configuracion').doc('estrellitas').set({ tareas, premios });
    }

    // Guardar niño (solo si NO es modo juego)
    async function guardarDatosNino() {
        if (!ninoSeleccionado || esModoJuego) return;
        await db.collection('ninios').doc(ninoSeleccionado.id).set(ninoSeleccionado);
        const idx = ninos.findIndex(n => n.id === ninoSeleccionado.id);
        if (idx !== -1) ninos[idx] = ninoSeleccionado;
        await db.collection('global').doc('datos').set({ ninos });
    }

    // Recalcular estadísticas (incluye puntos negativos)
    function recalcularStats(nino) {
        let ganado = 0, perdido = 0, canjeado = 0, reconocimiento = 0, actual = 0;
        let diasConPuntos = new Set();
        if (nino.historial) {
            for (const h of nino.historial) {
                if (h.puntos > 0) {
                    ganado += h.puntos;
                    actual += h.puntos;
                    if (h.esReconocimiento) reconocimiento += h.puntos;
                    let fecha = h.timestamp ? getFechaStrColombia(h.timestamp) : null;
                    if (fecha) diasConPuntos.add(fecha);
                } else {
                    if (h.esCanje) canjeado += Math.abs(h.puntos);
                    else perdido += Math.abs(h.puntos);
                    actual += h.puntos;
                }
            }
        }
        const hoyStr = getFechaStrColombia();
        let racha = 0;
        let fechaCursor = new Date(getFechaColombia());
        for (let i = 0; i < 30; i++) {
            let fechaStr = getFechaStrColombia(fechaCursor);
            if (diasConPuntos.has(fechaStr)) racha++;
            else break;
            fechaCursor.setDate(fechaCursor.getDate() - 1);
        }
        nino.totalGanado = ganado;
        nino.totalPerdido = perdido;
        nino.totalCanjeado = canjeado;
        nino.totalReconocimiento = reconocimiento;
        nino.puntos = actual; // permite negativos
        nino.rachaActual = racha;
        nino.mejorRacha = Math.max(nino.mejorRacha || 0, racha);
        
        let logros = [];
        if (ganado >= 100) logros.push("🏅 100 puntos ganados");
        if (ganado >= 500) logros.push("🏆 500 puntos ganados");
        if (reconocimiento >= 10) logros.push("👍🏻 10 reconocimientos");
        if (racha >= 5) logros.push("🔥 Racha de 5 días");
        if (racha >= 10) logros.push("⚡ Racha de 10 días");
        if (nino.historial && nino.historial.length >= 50) logros.push("📜 50 acciones registradas");
        if (nino.goldenTickets >= 5) logros.push("🎫 Coleccionista de Golden Tickets");
        nino.logros = logros;
        
        // Mascota basada en puntos ganados (totalGanado, no el saldo actual)
        if (ganado < 0) nino.mascota = "😢";
        else if (ganado < 100) nino.mascota = "🐣";
        else if (ganado < 300) nino.mascota = "🐥";
        else if (ganado < 600) nino.mascota = "🦊";
        else if (ganado < 1000) nino.mascota = "🦄";
        else nino.mascota = "🐉";
        
        return nino;
    }

    async function agregarHistorial(texto, cambio, esCanje = false, esReconocimiento = false) {
        if (!ninoSeleccionado) { mostrar("Selecciona un niño", false); return; }
        const entrada = {
            id: Date.now(),
            texto, puntos: cambio, esCanje, esReconocimiento,
            quien: currentUserData?.nombre || (esModoJuego ? '🎮 Juego' : 'Admin'),
            fecha: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        ninoSeleccionado.historial = [entrada, ...(ninoSeleccionado.historial || []).slice(0, 199)];
        const oldLogros = ninoSeleccionado.logros ? ninoSeleccionado.logros.length : 0;
        recalcularStats(ninoSeleccionado);
        const newLogros = ninoSeleccionado.logros.length;
        if (newLogros > oldLogros) playSound('logro');
        else if (cambio > 0) playSound('puntos');
        else if (esCanje) playSound('canje');
        await guardarDatosNino();
        render();
    }

    // ---------- TAREAS NORMALES CON LÍMITE DIARIO (una vez por niño) ----------
    async function darPuntos(idTarea) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        const tarea = tareas.find(t => t.id === idTarea);
        if (!tarea) return;
        
        const hoy = getFechaStrColombia();
if (!ninoSeleccionado.tareasCompletadas) ninoSeleccionado.tareasCompletadas = {};

// 🚨 SOLO aplica restricción si NO es modo juego
if (!esModoJuego && ninoSeleccionado.tareasCompletadas[tarea.id] === hoy) {
    mostrar(`Ya completaste "${tarea.nombre}" hoy. ¡Vuelve mañana!`, false);
    return;
}
        
        // 🚨 SOLO guarda restricción en modo normal
if (!esModoJuego) {
    ninoSeleccionado.tareasCompletadas[tarea.id] = hoy;
}
        await agregarHistorial(`✅ ${tarea.nombre} +${tarea.puntos}⭐`, tarea.puntos);
        mostrar(`+${tarea.puntos}⭐ para ${ninoSeleccionado.nombre}`);
    }

    // Quitar puntos: permite saldo negativo
    async function quitarPuntos(cantidad, motivo) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        await agregarHistorial(`🔻 ${motivo} -${cantidad}⭐`, -cantidad);
        mostrar(`-${cantidad}⭐ para ${ninoSeleccionado.nombre}`);
    }

    async function darReconocimiento(cantidad) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        if (await reconocimientoUsadoHoyGlobal(cantidad)) return mostrar(`Ya usaste +${cantidad}⭐ hoy`, false);
        await agregarHistorial(`👍🏻 Reconocimiento: +${cantidad}⭐`, cantidad, false, true);
        await marcarReconocimientoUsadoGlobal(cantidad);
        mostrar(`👍🏻 +${cantidad}⭐ para ${ninoSeleccionado.nombre}`);
    }

    async function canjearPremio(idPremio, usarGolden = false) {
        if (!ninoSeleccionado) return mostrar("Selecciona un niño", false);
        const premio = premios.find(p => p.id === idPremio);
        if (!premio) return;
        if (usarGolden) {
            if (ninoSeleccionado.goldenTickets >= 5) {
                ninoSeleccionado.goldenTickets -= 5;
                await agregarHistorial(`🎫 CANJE GOLDEN: ${premio.nombre} (sin costo de ⭐)`, 0);
                mostrar(`¡Canjeaste ${premio.nombre} con tus Golden Tickets!`);
                playSound('canje');
                render();
            } else {
                mostrar("No tienes suficientes Golden Tickets", false);
            }
        } else {
            if ((ninoSeleccionado.puntos || 0) >= premio.costo) {
                await agregarHistorial(`🎁 CANJE: ${premio.nombre} -${premio.costo}⭐`, -premio.costo, true);
                mostrar(`¡${ninoSeleccionado.nombre} canjeó ${premio.nombre}!`);
            } else mostrar(`Faltan ${premio.costo - ninoSeleccionado.puntos}⭐`, false);
        }
    }

async function eliminarEntrada(id) {
    if (!ninoSeleccionado) return;

    const entrada = ninoSeleccionado.historial.find(h => h.id === id);
    if (!entrada) return;

    // 🔁 Revertir efectos especiales

    // 1. Si era tarea → liberar bloqueo diario
    if (entrada.texto.includes("✅")) {
        const tarea = tareas.find(t => entrada.texto.includes(t.nombre));
        if (tarea && ninoSeleccionado.tareasCompletadas) {
            delete ninoSeleccionado.tareasCompletadas[tarea.id];
        }
    }

    // 2. Si era reconocimiento → liberar uso diario
    if (entrada.esReconocimiento) {
        const cantidad = Math.abs(entrada.puntos);
        const usuario = getUsuarioId();

        if (usuario === 'modoJuego') {
            localStorage.removeItem(`reco_${cantidad}`);
        } else {
            await db.collection('reconocimientosDiarios')
                .doc(`${usuario}_${cantidad}`)
                .delete();
        }
    }

    // 3. Si era ruleta → devolver giro + estrellas
    if (entrada.texto.includes("🎡 Ruleta")) {
        const hoy = getFechaStrColombia();

        if (ninoSeleccionado.girosRuleta && ninoSeleccionado.girosRuleta[hoy]) {
            ninoSeleccionado.girosRuleta[hoy]--;
            if (ninoSeleccionado.girosRuleta[hoy] <= 0) {
                delete ninoSeleccionado.girosRuleta[hoy];
            }
        }
    }

    // 4. Si era GOLD → quitar ticket
    if (entrada.texto.includes("Golden Ticket")) {
        if (ninoSeleccionado.goldenTickets > 0) {
            ninoSeleccionado.goldenTickets--;
        }
    }

    // 🗑 eliminar entrada
    ninoSeleccionado.historial = ninoSeleccionado.historial.filter(h => h.id !== id);

    recalcularStats(ninoSeleccionado);
    await guardarDatosNino();
    render();

    mostrar("↩️ Acción deshecha correctamente");
}

    async function toggleTareaRecurrente(tareaId) {
        if (!ninoSeleccionado) return;
        const hoy = getFechaStrColombia();
        if (!ninoSeleccionado.tareasRecurrentes) ninoSeleccionado.tareasRecurrentes = {};
        if (!ninoSeleccionado.tareasRecurrentes[tareaId]) ninoSeleccionado.tareasRecurrentes[tareaId] = {};
        const estado = ninoSeleccionado.tareasRecurrentes[tareaId][hoy] || 0;
        const tarea = tareasRecurrentesDef.find(t => t.id === tareaId);
        if (estado >= tarea.maxPorDia) return mostrar(`Ya completaste ${tarea.maxPorDia} veces hoy`, false);

    // ---------- RULETA CORREGIDA (flecha a la derecha, grosores variables) ----------
    let ruletaGirando = false;
    let ruletaAngulo = 0; // en grados (0 a 360)
    
    // Segmentos con pesos (grosor) y texto
    // Los pesos suman 100, así cada segmento ocupa un porcentaje del círculo.
    // Usaremos ángulos acumulados basados en los pesos.
    const segmentosConPeso = [
        { texto: "😵😵😵", puntos: 0, color: "#ef4444", tipo: "cero", peso: 8 },
        { texto: "+20⭐⭐", puntos: 20, color: "#10b981", tipo: "puntos", peso: 12 },
        { texto: "🔄", puntos: 0, color: "#f59e0b", tipo: "replay", peso: 10 },
        { texto: "+10⭐", puntos: 10, color: "#3b82f6", tipo: "puntos", peso: 14 },
        { texto: "+50⭐⭐⭐", puntos: 50, color: "#ec489a", tipo: "puntos", peso: 6 },
        { texto: "🔄", puntos: 0, color: "#f59e0b", tipo: "replay", peso: 10 },
        { texto: "😵😵😵", puntos: 0, color: "#ef4444", tipo: "cero", peso: 8 },
        { texto: "+10⭐", puntos: 10, color: "#3b82f6", tipo: "puntos", peso: 14 },
        { texto: "GOLD", puntos: 0, color: "#FFD700", tipo: "ticket", peso: 4 },   
        { texto: "🔄", puntos: 0, color: "#f59e0b", tipo: "replay", peso: 14 }
    ];
    
    // Calcular ángulos de inicio y fin para cada segmento (en grados)
    let totalPeso = 0;
    for (let s of segmentosConPeso) totalPeso += s.peso;
    let anguloAcum = 0;
    for (let s of segmentosConPeso) {
        s.anguloInicio = anguloAcum;
        s.anguloFin = anguloAcum + (s.peso / totalPeso) * 360;
        anguloAcum = s.anguloFin;
    }

    function obtenerSegmento(anguloRuleta) {
    let anguloAjustado = (360 - (anguloRuleta % 360)) % 360;

    for (let seg of segmentosConPeso) {
        if (anguloAjustado >= seg.anguloInicio && anguloAjustado < seg.anguloFin) {
            return seg;
        }
    }
    return segmentosConPeso[0];
}
    function dibujarRuleta(ctx, width, height, anguloActual) {
        const centerX = width / 2, centerY = height / 2;
        const radius = Math.min(width, height) / 2 - 15;
        for (let seg of segmentosConPeso) {
            const start = (seg.anguloInicio + anguloActual) * Math.PI / 180;
            const end = (seg.anguloFin + anguloActual) * Math.PI / 180;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.fillStyle = seg.color;
            ctx.fill();
            
            if (seg.tipo === 'ticket') {
            // Borde grueso tipo jackpot
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 5;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.restore();
        
            // Brillo interno pulsante
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
            ctx.restore();
        }
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(start + (end - start) / 2);
            ctx.fillStyle = (seg.tipo === 'ticket') ? '#000' : '#fff';
            if (seg.tipo === 'ticket') {
                ctx.font = `bold ${Math.max(16, radius / 9)}px "Segoe UI"`;
            } else {
                ctx.font = `bold ${Math.max(12, radius / 11)}px "Segoe UI"`;
            }
            ctx.font = `bold ${Math.max(12, radius / 11)}px "Segoe UI"`;
            let textoMostrar = seg.texto;
            if (seg.texto === "🔄") textoMostrar = "🔄";
            else if (seg.texto === "GOLD") textoMostrar = "GOLD";
            let distanciaTexto = radius * 0.48;

if (seg.tipo === 'ticket') distanciaTexto = radius * 0.42; // GOLD más centrado
if (seg.tipo === 'puntos' && seg.puntos >= 50) distanciaTexto = radius * 0.44; // textos largos

ctx.fillText(textoMostrar, distanciaTexto, 6);
            ctx.restore();
        }
        // Flecha fija en la parte derecha (ángulo 0° en nuestro sistema, que es las 3 en punto)
        ctx.beginPath();
        const flechaX = centerX + radius + 5;
        const flechaY = centerY;
        ctx.moveTo(flechaX -20, flechaY);
        ctx.lineTo(flechaX, flechaY - 15);
        ctx.lineTo(flechaX , flechaY + 15);
        ctx.fillStyle = '#facc15';
        ctx.shadowColor = '#facc15';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#facc15';
        ctx.fill();
        // Círculo central
        ctx.beginPath();
        ctx.arc(centerX, centerY, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#0f172a';
        ctx.fill();
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText("⭐", centerX-9, centerY+5);
    }

    function renderCalendario() {
        if (!ninoSeleccionado) return "<p>Selecciona un niño</p>";
        const hoyCol = getFechaColombia();
        const year = hoyCol.getFullYear();
        const month = hoyCol.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let html = `<h4>📅 Actividad - ${hoyCol.toLocaleString('default', { month: 'long' })} ${year}</h4><div class="calendario">`;
        for (let i=0; i<firstDay; i++) html += `<div class="dia-calendario"></div>`;
        const mapaPuntos = new Map();
        ninoSeleccionado.historial?.forEach(h => {
            let fecha = h.timestamp ? getFechaStrColombia(h.timestamp) : null;
            if (fecha && fecha.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) {
                mapaPuntos.set(fecha, (mapaPuntos.get(fecha)||0) + h.puntos);
            }
        });
        for (let d=1; d<=daysInMonth; d++) {
            const fechaStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const puntos = mapaPuntos.get(fechaStr)||0;
            let color = puntos>0 ? '#10b981' : (puntos<0 ? '#ef4444' : '#64748b');
            html += `<div class="dia-calendario" style="background:${color}; color:white;">${d}<br>${puntos}⭐</div>`;
        }
        html += `</div>`;
        return html;
    }

    function prepararDatosGrafica(nino, tipo = 'semana') {
        if (!nino || !nino.historial) return { labels: [], datos: [] };
        const hoyCol = getFechaColombia();
        hoyCol.setHours(0,0,0,0);
        let dias = tipo === 'semana' ? 7 : 30;
        let fechas = [];
        for (let i = dias - 1; i >= 0; i--) {
            let fecha = new Date(hoyCol);
            fecha.setDate(hoyCol.getDate() - i);
            fechas.push(fecha);
        }
        const mapa = new Map();
        fechas.forEach(f => mapa.set(getFechaStrColombia(f), 0));
        nino.historial.forEach(h => {
            let fechaKey = h.timestamp ? getFechaStrColombia(h.timestamp) : null;
            if (fechaKey && mapa.has(fechaKey)) {
                mapa.set(fechaKey, mapa.get(fechaKey) + h.puntos);
            }
        });
        const labels = fechas.map(f => f.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
        const datos = fechas.map(f => mapa.get(getFechaStrColombia(f)) || 0);
        return { labels, datos };
    }

                     <div class="tarea reconocimiento"><span>👍🏻👍🏻👍🏻 Excelente</span><button onclick="darReconocimiento(3)" ${u3 ? 'disabled' : ''}>+3⭐</button></div>
                     </div>`;

    window.seleccionarMeta = seleccionarMeta;

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user; esModoJuego = false;
            const doc = await db.collection('users').doc(user.uid).get();
            isAdmin = doc.exists ? doc.data().isAdmin : false;
            currentUserData = doc.exists ? doc.data() : null;
            await cargarConfiguracion();
            const globalData = await db.collection('global').doc('datos').get();
            ninos = globalData.exists ? globalData.data().ninos || [] : [];
            for (let i = 0; i < ninos.length; i++) {
                const nd = await db.collection('ninios').doc(ninos[i].id).get();
                if (nd.exists) ninos[i] = nd.data();
                if (!ninos[i].mejorRacha) ninos[i].mejorRacha = 0;
                if (!ninos[i].tareasRecurrentes) ninos[i].tareasRecurrentes = {};
                if (!ninos[i].tareasCompletadas) ninos[i].tareasCompletadas = {};
                if (ninos[i].goldenTickets === undefined) ninos[i].goldenTickets = 0;
                if (!ninos[i].girosRuleta) ninos[i].girosRuleta = {};
                recalcularStats(ninos[i]);

            render();
        } else if (!esModoJuego) renderLogin();
        else { await cargarConfiguracion(); render(); }
    });
